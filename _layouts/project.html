---
layout: default
---
<article class="project">
  <h1>{{ page.title }}</h1>
  {% if page.tech %}
    <ul class="tech-list">
      {% for t in page.tech %}<li>{{ t }}</li>{% endfor %}
    </ul>
  {% endif %}
  {% if page.link %}
    <p><a href="{{ page.link }}" target="_blank">View project →</a></p>
  {% endif %}
  <div class="project-body">
    {{ content }}
  </div>
</article>
