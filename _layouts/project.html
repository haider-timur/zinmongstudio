---
layout: default
---
<article class="project">
  <h1>{{ page.title }}</h1>
  <div class="project-body">
    {{ content }}
  </div>

  {% if page.images %}
    <div class="project-gallery">
      {% for img in page.images %}
        <figure>
          <img src="{{ img.src | relative_url }}" alt="{{ img.alt }}">
          {% if img.caption %}
            <figcaption>{{ img.caption }}</figcaption>
          {% endif %}
        </figure>
      {% endfor %}
    </div>
  {% endif %}
  
</article>
